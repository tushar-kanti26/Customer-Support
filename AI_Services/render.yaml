services:
  - type: web
    name: resolvex-api
    runtime: python
    rootDir: AI_Services/app
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: resolvex-postgres
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DEBUG_MODE
        value: "false"
      - key: AUTO_POLL_ENABLED
        value: "false"

databases:
  - name: resolvex-postgres
    databaseName: customer_care
    plan: basic-256mb
